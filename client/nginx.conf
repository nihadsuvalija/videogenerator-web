server {
    listen 80;

    location /api {
        proxy_pass http://server:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 2G;
    }

    location /outputs {
        proxy_pass http://server:5000;
    }

    location /assets {
        proxy_pass http://server:5000;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
