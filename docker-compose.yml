version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: videogen-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  server:
    build: ./server
    container_name: videogen-server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017/videogen
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./server/data:/app/data

  client:
    build: ./client
    container_name: videogen-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongo_data:
